version: '3.8'

services:

  # ──────────────────────────────────────────────
  # INFRASTRUCTURE
  # ──────────────────────────────────────────────

  postgresql:
    image: postgres:16
    container_name: postgresql
    environment:
      POSTGRES_USER: okteto
      POSTGRES_PASSWORD: okteto
      POSTGRES_DB: votes
    ports:
      - "5432:5432"
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U okteto -d votes"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # APPLICATION SERVICES
  # image: uses GHCR image if set via env var,
  #        falls back to local tag when building.
  # ──────────────────────────────────────────────

  vote:
    image: ${VOTE_IMAGE:-vote:local}
    build:
      context: ./vote
      dockerfile: Dockerfile
    container_name: vote
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  worker:
    image: ${WORKER_IMAGE:-worker:local}
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: worker
    depends_on:
      kafka:
        condition: service_healthy
      postgresql:
        condition: service_healthy
    restart: on-failure

  result:
    image: ${RESULT_IMAGE:-result:local}
    build:
      context: ./result
      dockerfile: Dockerfile
    container_name: result
    ports:
      - "4000:80"       # app exposes :80 inside container (see Dockerfile ENV PORT 80)
    depends_on:
      postgresql:
        condition: service_healthy
    restart: on-failure

volumes:
  postgresql-data:
