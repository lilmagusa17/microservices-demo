name: Infra Deploy

on:
  push:
    branches: [staging, production]

jobs:
  deploy-infra:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Deploy Infra
        run: |
          helm upgrade --install infra ./infrastructure