name: CD

on:
  push:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: Build Docker images and push to GitHub Container Registry
  # ──────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push images to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    outputs:
      # Fix 3: expose the exact SHA-tagged image reference so the deploy
      # job pulls the same image that was just built, not a stale :latest.
      vote_image:   ghcr.io/${{ github.repository_owner }}/vote:${{ steps.meta-vote.outputs.version }}
      result_image: ghcr.io/${{ github.repository_owner }}/result:${{ steps.meta-result.outputs.version }}
      worker_image: ghcr.io/${{ github.repository_owner }}/worker:${{ steps.meta-worker.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── VOTE (Java / Spring Boot) ──
      - name: Generate tags for vote
        id: meta-vote
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vote
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push vote
        uses: docker/build-push-action@v5
        with:
          context: ./vote
          push: true
          tags: ${{ steps.meta-vote.outputs.tags }}

      # ── RESULT (Node.js) ──
      - name: Generate tags for result
        id: meta-result
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/result
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push result
        uses: docker/build-push-action@v5
        with:
          context: ./result
          push: true
          tags: ${{ steps.meta-result.outputs.tags }}

      # ── WORKER (Go) ──
      - name: Generate tags for worker
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/worker
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Deploy — spin up full stack with the freshly-pushed images
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy with Docker Compose
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Fix 3: use the SHA-tagged images from the build-and-push outputs
      # instead of hardcoding :latest, so we deploy exactly what was built.
      - name: Pull images and deploy
        env:
          VOTE_IMAGE:   ${{ needs.build-and-push.outputs.vote_image }}
          RESULT_IMAGE: ${{ needs.build-and-push.outputs.result_image }}
          WORKER_IMAGE: ${{ needs.build-and-push.outputs.worker_image }}
        run: |
          docker compose up -d --no-build --pull always

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for all services to be healthy..."
          sleep 90
          docker compose ps

      # Fix 1: use { ...; exit 1; } so a failed curl actually fails the job.
      - name: Verify vote app is responding
        run: |
          curl --retry 10 --retry-delay 5 --retry-connrefused -f http://localhost:8080 \
            && echo "Vote app OK" \
            || { echo "Vote app not responding after retries"; exit 1; }

      - name: Verify result app is responding
        run: |
          curl --retry 10 --retry-delay 5 --retry-connrefused -f http://localhost:4000 \
            && echo "Result app OK" \
            || { echo "Result app not responding after retries"; exit 1; }

      # Fix 2: step was missing its run block — added docker compose logs.
      - name: Print logs on failure
        if: failure()
        run: docker compose logs
