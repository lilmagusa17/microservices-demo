name: CD

on:
  push:
    branches: [main]

# Fix review-1: single source of truth for the registry.
# Change REGISTRY here and it propagates everywhere automatically.
env:
  REGISTRY: ghcr.io

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: Build Docker images and push to GitHub Container Registry
  # ──────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push images to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    outputs:
      # Fix review-1+2: image refs are built from steps.vars.outputs.*
      # so the registry/repo path is defined once and the SHA comes
      # directly from $GITHUB_SHA (not from metadata-action internals).
      vote_image:   ${{ steps.vars.outputs.image_base }}/vote:${{ steps.vars.outputs.sha_short }}
      result_image: ${{ steps.vars.outputs.image_base }}/result:${{ steps.vars.outputs.sha_short }}
      worker_image: ${{ steps.vars.outputs.image_base }}/worker:${{ steps.vars.outputs.sha_short }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fix review-1+2: compute image_base and sha_short once here.
      # All subsequent steps and the job outputs reference these values.
      # sha_short uses $GITHUB_SHA directly — no dependency on metadata-action behavior.
      - name: Set image base and short SHA
        id: vars
        run: |
          echo "image_base=${{ env.REGISTRY }}/${{ github.repository_owner }}" >> $GITHUB_OUTPUT
          echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── VOTE (Java / Spring Boot) ──
      - name: Generate tags for vote
        id: meta-vote
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image_base }}/vote
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push vote
        uses: docker/build-push-action@v5
        with:
          context: ./vote
          push: true
          tags: ${{ steps.meta-vote.outputs.tags }}

      # ── RESULT (Node.js) ──
      - name: Generate tags for result
        id: meta-result
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image_base }}/result
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push result
        uses: docker/build-push-action@v5
        with:
          context: ./result
          push: true
          tags: ${{ steps.meta-result.outputs.tags }}

      # ── WORKER (Go) ──
      - name: Generate tags for worker
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image_base }}/worker
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Deploy — spin up full stack with the freshly-pushed images
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy with Docker Compose
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images and deploy
        env:
          VOTE_IMAGE:   ${{ needs.build-and-push.outputs.vote_image }}
          RESULT_IMAGE: ${{ needs.build-and-push.outputs.result_image }}
          WORKER_IMAGE: ${{ needs.build-and-push.outputs.worker_image }}
        run: |
          docker compose up -d --no-build --pull always

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for all services to be healthy..."
          sleep 90
          docker compose ps

      - name: Verify vote app is responding
        run: |
          curl --retry 10 --retry-delay 5 --retry-connrefused -f http://localhost:8080 \
            && echo "Vote app OK" \
            || { echo "Vote app not responding after retries"; exit 1; }

      - name: Verify result app is responding
        run: |
          curl --retry 10 --retry-delay 5 --retry-connrefused -f http://localhost:4000 \
            && echo "Result app OK" \
            || { echo "Result app not responding after retries"; exit 1; }

      - name: Print logs on failure
        if: failure()
        run: docker compose logs
