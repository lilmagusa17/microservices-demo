name: CD

on:
  push:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: Build Docker images and push to GitHub Container Registry
  # ──────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push images to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    outputs:
      vote_image:   ${{ steps.meta-vote.outputs.tags }}
      result_image: ${{ steps.meta-result.outputs.tags }}
      worker_image: ${{ steps.meta-worker.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── VOTE (Java / Spring Boot) ──
      - name: Generate tags for vote
        id: meta-vote
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vote
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push vote
        uses: docker/build-push-action@v5
        with:
          context: ./vote
          push: true
          tags: ${{ steps.meta-vote.outputs.tags }}

      # ── RESULT (Node.js) ──
      - name: Generate tags for result
        id: meta-result
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/result
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push result
        uses: docker/build-push-action@v5
        with:
          context: ./result
          push: true
          tags: ${{ steps.meta-result.outputs.tags }}

      # ── WORKER (Go) ──
      - name: Generate tags for worker
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/worker
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Deploy — spin up full stack with the freshly-pushed images
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy with Docker Compose
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images and deploy
        env:
          VOTE_IMAGE:   ghcr.io/${{ github.repository_owner }}/vote:latest
          RESULT_IMAGE: ghcr.io/${{ github.repository_owner }}/result:latest
          WORKER_IMAGE: ghcr.io/${{ github.repository_owner }}/worker:latest
        run: |
          docker compose up -d --no-build --pull always

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for all services to be healthy..."
          sleep 90
          docker compose ps

      - name: Verify vote app is responding
        run: |
          curl --retry 10 --retry-delay 5 --retry-connrefused -f http://localhost:8080 \
            && echo "✅ Vote app OK" || echo "⚠️  Vote app not responding yet"

      - name: Verify result app is responding
        run: |
          curl --retry 10 --retry-delay 5 --retry-connrefused -f http://localhost:4000 \
            && echo "✅ Result app OK" || echo "⚠️  Result app not responding yet"

      - name: Print logs on failure
        if: failure()
        run: docker compose logs
